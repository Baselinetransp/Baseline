<svg viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Road curving into distance -->
  <path d="M70 5 Q100 20, 100 35 Q100 50, 130 65" fill="none" stroke="#1a1a1a" stroke-width="25" stroke-linecap="round"/>
  <path d="M75 8 Q100 22, 100 35 Q100 48, 125 60" fill="none" stroke="#FFD700" stroke-width="2" stroke-dasharray="4 3"/>

  <!-- Left vertical bar -->
  <rect x="25" y="15" width="12" height="70" rx="6" fill="#1a1a1a"/>

  <!-- Right vertical bar -->
  <rect x="163" y="15" width="12" height="70" rx="6" fill="#1a1a1a"/>

  <!-- Left Wheel -->
  <g transform="translate(60, 55)">
    <!-- Tire -->
    <circle cx="0" cy="0" r="28" fill="#1a1a1a"/>
    <circle cx="0" cy="0" r="23" fill="#333"/>
    <!-- Rim -->
    <circle cx="0" cy="0" r="18" fill="#e8e8e8" stroke="#ccc" stroke-width="1"/>
    <!-- Rim spokes -->
    <g fill="#888">
      <path d="M0 -2 L0 -16 Q2 -17, 3 -15 L2 -2 Z"/>
      <path d="M0 -2 L0 -16 Q2 -17, 3 -15 L2 -2 Z" transform="rotate(60)"/>
      <path d="M0 -2 L0 -16 Q2 -17, 3 -15 L2 -2 Z" transform="rotate(120)"/>
      <path d="M0 -2 L0 -16 Q2 -17, 3 -15 L2 -2 Z" transform="rotate(180)"/>
      <path d="M0 -2 L0 -16 Q2 -17, 3 -15 L2 -2 Z" transform="rotate(240)"/>
      <path d="M0 -2 L0 -16 Q2 -17, 3 -15 L2 -2 Z" transform="rotate(300)"/>
    </g>
    <!-- Center hub -->
    <circle cx="0" cy="0" r="5" fill="#666"/>
    <circle cx="0" cy="0" r="3" fill="#444"/>
  </g>

  <!-- Right Wheel -->
  <g transform="translate(115, 55)">
    <!-- Tire -->
    <circle cx="0" cy="0" r="28" fill="#1a1a1a"/>
    <circle cx="0" cy="0" r="23" fill="#333"/>
    <!-- Rim -->
    <circle cx="0" cy="0" r="18" fill="#e8e8e8" stroke="#ccc" stroke-width="1"/>
    <!-- Rim spokes -->
    <g fill="#888">
      <path d="M0 -2 L0 -16 Q2 -17, 3 -15 L2 -2 Z"/>
      <path d="M0 -2 L0 -16 Q2 -17, 3 -15 L2 -2 Z" transform="rotate(60)"/>
      <path d="M0 -2 L0 -16 Q2 -17, 3 -15 L2 -2 Z" transform="rotate(120)"/>
      <path d="M0 -2 L0 -16 Q2 -17, 3 -15 L2 -2 Z" transform="rotate(180)"/>
      <path d="M0 -2 L0 -16 Q2 -17, 3 -15 L2 -2 Z" transform="rotate(240)"/>
      <path d="M0 -2 L0 -16 Q2 -17, 3 -15 L2 -2 Z" transform="rotate(300)"/>
    </g>
    <!-- Center hub -->
    <circle cx="0" cy="0" r="5" fill="#666"/>
    <circle cx="0" cy="0" r="3" fill="#444"/>
  </g>

  <!-- Yellow Car silhouette -->
  <g transform="translate(145, 78)">
    <path d="M0 0 Q5 -8, 15 -8 Q20 -8, 22 -4 L28 -4 Q32 -4, 35 0 L0 0 Z" fill="#DFFF00" stroke="#b8cc00" stroke-width="0.5"/>
    <!-- Car wheels -->
    <circle cx="7" cy="0" r="3" fill="#1a1a1a"/>
    <circle cx="28" cy="0" r="3" fill="#1a1a1a"/>
  </g>
</svg>
